name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Swift Version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  demo-smoke:
    runs-on: macos-26
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Demo Project
        working-directory: DemoApp
        run: xcodegen generate
      - name: Build Demo App
        run: xcodebuild -project DemoApp/SpacesNavigationDemoApp.xcodeproj -scheme SpacesNavigationDemoApp -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" build
